## PostgreSQL proxy — internal cluster access
apiVersion: v1
kind: Service
metadata:
  name: argus-pg
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
    app.kubernetes.io/component: proxy
spec:
  selector:
    app.kubernetes.io/name: argus
  ports:
    - name: pg-proxy
      port: 5432
      targetPort: pg-proxy
      protocol: TCP
  type: ClusterIP
---
## MySQL proxy — internal cluster access
apiVersion: v1
kind: Service
metadata:
  name: argus-mysql
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
    app.kubernetes.io/component: proxy
spec:
  selector:
    app.kubernetes.io/name: argus
  ports:
    - name: mysql-proxy
      port: 3306
      targetPort: mysql-proxy
      protocol: TCP
  type: ClusterIP
---
## Admin API — internal only, NOT exposed externally
apiVersion: v1
kind: Service
metadata:
  name: argus-admin
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
    app.kubernetes.io/component: admin
spec:
  selector:
    app.kubernetes.io/name: argus
  ports:
    - name: admin
      port: 9090
      targetPort: admin
      protocol: TCP
  type: ClusterIP
---
## Metrics — Prometheus scrape endpoint
apiVersion: v1
kind: Service
metadata:
  name: argus-metrics
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
    app.kubernetes.io/component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: argus
  ports:
    - name: metrics
      port: 9091
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
