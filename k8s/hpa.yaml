apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argus
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argus
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min cool-down before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
