## Argus secrets — replace base64-encoded values before applying.
## Generate with:  echo -n 'value' | base64
##
## DO NOT commit real credentials. Use an external secrets manager
## (e.g. External Secrets Operator, Vault, Sealed Secrets) in production.
apiVersion: v1
kind: Secret
metadata:
  name: argus-secrets
  namespace: argus
  labels:
    app.kubernetes.io/name: argus
type: Opaque
data:
  ## Database hostnames / passwords
  DB_PG_HOST: cG9zdGdyZXM=          # postgres
  DB_PG_PASSWORD: Y2hhbmdlbWU=      # changeme
  DB_MYSQL_HOST: bXlzcWw=           # mysql
  DB_MYSQL_PASSWORD: Y2hhbmdlbWU=  # changeme
  ## Admin API token
  ARGUS_ADMIN_TOKEN: Y2hhbmdlLW1lLW5vdw==  # change-me-now
  ## SIEM webhook URL (optional)
  SIEM_WEBHOOK_URL: ""
