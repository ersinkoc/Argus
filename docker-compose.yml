services:
  # ============================================
  # Target Databases (direct access ports 30000+)
  # ============================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus_test
      POSTGRES_PASSWORD: argus_pass
      POSTGRES_DB: testdb
    ports:
      - "35432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus_test -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  mysql:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_USER: argus_test
      MARIADB_PASSWORD: argus_pass
      MARIADB_DATABASE: testdb
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "argus_test", "-pargus_pass"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Argus_Pass123!"
      MSSQL_PID: "Developer"
    ports:
      - "31433:1433"
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Argus_Pass123!' -Q 'SELECT 1' -C -N"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mssql_data:/var/opt/mssql

  # ============================================
  # Argus Proxy (proxy ports 30100+)
  # ============================================

  argus:
    build:
      context: .
      args:
        VERSION: "v1.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "30100:15432"   # PG proxy
      - "30101:13306"   # MySQL proxy
      - "30102:11433"   # MSSQL proxy
      - "30200:9091"    # Metrics/Admin
    volumes:
      - ./configs:/etc/argus:ro
      - argus_logs:/var/log/argus
    command: ["-config", "/etc/argus/argus-multidb.json"]
    restart: unless-stopped

volumes:
  pg_data:
  mysql_data:
  mssql_data:
  argus_logs:
